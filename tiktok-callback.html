<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Login Callback</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #080810; color: #fff; }
        .container { text-align: center; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: #6366f1; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Authenticating with TikTok...</h2>
        <p>Redirecting back to your local application.</p>
    </div>
    <script>
        // Extract all query parameters and hash from the current URL
        const search = window.location.search;
        // Redirect to the local app's callback URL
        const localAppUrl = "http://localhost:3000/api/auth/tiktok/callback" + search;
        
        // Wait a brief moment before redirecting
        setTimeout(() => {
            window.location.href = localAppUrl;
        }, 500);
    </script>
</body>
</html>
